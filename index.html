<!DOCTYPE html>
<html>
<head>
    <title>Motivation Roulette</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        #wheel-container { position: relative; width: 500px; height: 500px; margin: 0 auto; }
        canvas { border-radius: 50%; border: 10px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); }
        #pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                   border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid gold; z-index: 10; }
        button { margin-top: 30px; padding: 15px 30px; font-size: 20px; cursor: pointer; background: gold; border: none; border-radius: 5px; font-weight: bold; }
        #result { margin-top: 20px; font-size: 24px; color: gold; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

    <h1>Motivation Roulette</h1>
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <button onclick="spin()">SPIN THE WHEEL</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        
        // Items defined with their original "motivational" status
        const items = [
            { text: "Study for IT Certs", type: "high" },
            { text: "Take a Class", type: "high" },
            { text: "Complete Work Task", type: "high" },
            { text: "System Admin Lab", type: "high" },
            { text: "Prep Meal Plan", type: "high" },
            { text: "Gym/Exercise", type: "high" },
            { text: "Read a Book", type: "low" },
            { text: "Play Board Game", type: "low" },
            { text: "Watch Star Wars", type: "low" },
            { text: "Listen to Music", type: "low" },
            { text: "Browse YouTube", type: "low" },
            { text: "Take a Nap", type: "low" },
            { text: "Check 3D Prints", type: "low" },
            { text: "Research Motorcycles", type: "low" },
            { text: "Look at Menus", type: "low" },
            { text: "Doodle Designs", type: "low" },
            { text: "Clean Space", type: "low" },
            { text: "Watch a Movie", type: "low" }
        ];

        // Fisher-Yates Scramble function
        function scramble(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        scramble(items);

        const numSectors = items.length;
        const arc = 2 * Math.PI / numSectors;

        function drawWheel() {
            items.forEach((item, i) => {
                const angle = i * arc;
                ctx.fillStyle = item.type === "high" ? "#27ae60" : "#c0392b";
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, angle, angle + arc);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.fillStyle = "white";
                ctx.textAlign = "right";
                ctx.font = "bold 12px Arial";
                ctx.fillText(item.text, 230, 5);
                ctx.restore();
            });
        }

        let currentRotation = 0;

        function spin() {
            document.getElementById('result').innerText = "Spinning...";
            const extraSpin = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += extraSpin;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const netRotation = (currentRotation % 360);
                const sectorAngle = 360 / numSectors;
                const resultIndex = Math.floor(((360 - netRotation + 270) % 360) / sectorAngle);
                
                document.getElementById('result').innerText = "Today's Fate: " + items[resultIndex].text;
            }, 4000);
        }

        drawWheel();
    </script>
</body>
</html>
